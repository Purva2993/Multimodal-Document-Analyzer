services:
    api:
      build:
        context: ..
        dockerfile: docker/Dockerfile
      command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload
      ports:
        - "8000:8000"
      volumes:
        - ..:/app
        - ../data:/app/data
        - ../models:/app/models
      env_file:
        - ../.env

    frontend:
      build:
        context: ..
        dockerfile: docker/Dockerfile
      command: python app/gradio_app.py
      ports:
        - "7860:7860"
      volumes:
        - ..:/app
        - ../data:/app/data
        - ../models:/app/models
      env_file:
        - ../.env
      environment:
        - API_URL=http://api:8000
      depends_on:
        - api